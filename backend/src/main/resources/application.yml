spring:
  application:
    name: standupsync-backend
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/standupsync?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:standupsync-jwt-secret-key-2026-very-long-secure}
  expiration: 86400000

ai:
  provider: ${AI_PROVIDER:openai}
  model: ${AI_MODEL:deepseek-chat}
  api-key: ${AI_API_KEY:}
  base-url: ${AI_BASE_URL:https://api.deepseek.com}
  temperature: 0.7
  max-tokens: 4096

logging:
  level:
    com.standupsync: ${LOG_LEVEL:INFO}
